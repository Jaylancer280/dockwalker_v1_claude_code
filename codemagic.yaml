workflows:
  ios-testflight:
    name: iOS TestFlight Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: DockWalker
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: io.dockwalker.app
      groups:
        - dockwalker_staging
      vars:
        NEXT_PUBLIC_SUPABASE_URL: https://hwpcuehqawullzqbmcdv.supabase.co
        NEXT_PUBLIC_SITE_URL: https://dockwalker.io
      node: 20
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install Node dependencies
        script: |
          cd apps/web
          npm ci

      - name: Build Next.js static export
        script: |
          cd apps/web
          CAPACITOR_BUILD=1 npm run build

      - name: Sync Capacitor
        script: |
          cd apps/web
          npx cap sync ios

      - name: Set up code signing
        script: |
          keychain initialize

      - name: Install CocoaPods
        script: |
          cd apps/web/ios/App
          pod install || true

      - name: Set bundle identifier
        script: |
          cd apps/web/ios/App
          agvtool new-version -all $(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" || echo 0) + 1))

      - name: Build iOS
        script: |
          cd apps/web/ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App"

    artifacts:
      - apps/web/ios/App/build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - DockWalker Testers
