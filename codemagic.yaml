workflows:
  ios-testflight:
    name: iOS TestFlight Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: io.dockwalker.app
      groups:
        - dockwalker_staging
      vars:
        NEXT_PUBLIC_SUPABASE_URL: https://hwpcuehqawullzqbmcdv.supabase.co
        NEXT_PUBLIC_SITE_URL: https://dockwalker.io
      node: 22
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install Node dependencies
        script: |
          cd apps/web
          npm ci

      - name: Configure Capacitor for remote server
        script: |
          cd apps/web
          cat > capacitor.config.ts << 'CAPEOF'
          import type { CapacitorConfig } from '@capacitor/cli';
          const config: CapacitorConfig = {
            appId: 'io.dockwalker.app',
            appName: 'DockWalker',
            webDir: 'public',
            server: {
              url: 'https://dockwalker.io',
              cleartext: false,
            },
            plugins: {
              SplashScreen: {
                launchAutoHide: true,
                launchShowDuration: 2000,
                backgroundColor: '#0B1A2E',
                showSpinner: false,
              },
              StatusBar: {
                style: 'LIGHT',
                backgroundColor: '#FFFFFF',
              },
              PushNotifications: {
                presentationOptions: ['badge', 'sound', 'alert'],
              },
            },
            ios: {
              scheme: 'DockWalker',
              contentInset: 'always',
            },
          };
          export default config;
          CAPEOF

      - name: Sync Capacitor
        script: |
          cd apps/web
          mkdir -p public
          npx cap sync ios

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "io.dockwalker.app" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates

      - name: Set Xcode signing
        script: |
          cd apps/web/ios/App
          xcode-project use-profiles

      - name: Fix app icon (remove alpha channel)
        script: |
          ICON="apps/web/ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png"
          # sips is built into macOS — no dependencies needed
          sips -s format png -s formatOptions nointerlace "$ICON" --out /tmp/icon_clean.png
          # Remove alpha by converting to jpg then back to png (sips trick)
          sips -s format jpeg /tmp/icon_clean.png --out /tmp/icon_noa.jpg
          sips -s format png /tmp/icon_noa.jpg --out "$ICON"
          sips -z 1024 1024 "$ICON"

      - name: Resolve Swift packages
        script: |
          cd apps/web/ios/App
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App

      - name: Increment build number
        script: |
          cd apps/web/ios/App
          agvtool new-version -all $PROJECT_BUILD_NUMBER

      - name: Build iOS
        script: |
          cd apps/web/ios/App
          xcode-project build-ipa \
            --project "App.xcodeproj" \
            --scheme "App" \
            --archive-xcargs "CODE_SIGN_STYLE=Manual"

    artifacts:
      - apps/web/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
