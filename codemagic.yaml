workflows:
  ios-testflight:
    name: iOS TestFlight Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: io.dockwalker.app
      groups:
        - dockwalker_staging
      vars:
        NEXT_PUBLIC_SUPABASE_URL: https://hwpcuehqawullzqbmcdv.supabase.co
        NEXT_PUBLIC_SITE_URL: https://dockwalker.io
      node: 20
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install Node dependencies
        script: |
          cd apps/web
          npm ci

      - name: Build Next.js static export
        script: |
          cd apps/web
          CAPACITOR_BUILD=1 npm run build

      - name: Sync Capacitor
        script: |
          cd apps/web
          npx cap sync ios

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "io.dockwalker.app" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates

      - name: Set Xcode signing
        script: |
          cd apps/web/ios/App
          xcode-project use-profiles

      - name: Increment build number
        script: |
          cd apps/web/ios/App
          LATEST=$(app-store-connect get-latest-testflight-build-number "io.dockwalker.app" || echo "0")
          agvtool new-version -all $(($LATEST + 1))

      - name: Build iOS
        script: |
          cd apps/web/ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App"

    artifacts:
      - apps/web/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
